server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Relativa redirects - annars tappas porten nar containern nas direkt
    # (t.ex. host:8138/hoppspelet) och Host-headern saknar port.
    absolute_redirect off;

    # Appen kan nas bade pa / och under /hoppspelet/ (Nginx Proxy Manager
    # skickar vidare HELA sokvagen till containern i en custom location).
    # Prefixet skalas av har med en intern rewrite, sa att alla location-
    # regler nedan galler oavsett vilken vag appen nas. Alla lankar i appen
    # (aven manifest/service worker) ar relativa, sa PWA:n fungerar under
    # bada sokvagarna.
    location = /hoppspelet { return 301 /hoppspelet/; }
    rewrite ^/hoppspelet/(.*)$ /$1 last;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css text/javascript application/javascript application/manifest+json image/svg+xml;

    # Manifestet styr PWA:n - ratt MIME-typ och cachea aldrig
    location ~* \.webmanifest$ {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Dessa styr uppdateringar av PWA:n - cachea aldrig
    location ~* ^/(index\.html|sw\.js)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
