  // ---------- Litet minispel-ramverk ----------
  // En enkel "engine" med game loop, entiteter och kollisionshjälp.
  const Engine = {
    canvas: null,
    ctx: null,
    keys: {},
    entities: [],
    onUpdate: null,
    onDraw: null,
    lastTime: 0,

    init(canvas) {
      this.canvas = canvas;
      this.ctx = canvas.getContext("2d");
      window.addEventListener("keydown", (e) => {
        this.keys[e.code] = true;
        if (e.code === "Space") e.preventDefault();
        if (this.onKeyDown) this.onKeyDown(e.code);
      });
      window.addEventListener("keyup", (e) => {
        this.keys[e.code] = false;
      });
    },

    start(update, draw) {
      this.onUpdate = update;
      this.onDraw = draw;
      requestAnimationFrame(this.loop.bind(this));
    },

    loop(time) {
      this.onUpdate();
      this.onDraw();
      requestAnimationFrame(this.loop.bind(this));
    }
  };

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  Engine.init(canvas);

  // ---------- Ljud ----------
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  // ---------- Bakgrundsmusik (procedurell, upbeat, laag volym) ----------
  let musicOn = true;
  try { musicOn = localStorage.getItem("hoppspelet_music") !== "off"; } catch (e) {}
  let musicGain = null;
  let musicStarted = false;
  let musicStep = 0;
  let musicTimer = null;
  const MUSIC_VOL = 0.05;
  const STEP_MS = 145;

  // Halvtonssteg fran C5 (523.25 Hz). En lang loop (16 takter / 64 steg) med fyra
  // olika fraser sa den inte later sa enformig.
  const C5 = 523.25;
  const semi = (n) => C5 * Math.pow(2, n / 12);

  // 64 steg = 16 takter a 4 steg. Melodin arpeggierar med varierande kontur och rester (null).
  const MELODY = [
    // Fras 1: C  G  Am F
    0, 4, 7, 12,   11, 7, 11, 14,   12, 9, 12, 16,   14, 12, 9, 5,
    // Fras 2: F  G  C  Am
    5, 9, 12, 9,   7, 11, 14, 11,   12, 7, 4, 7,     9, 12, 9, 4,
    // Fras 3: Am F  C  G
    16, 12, 9, 12, 12, 9, 5, 9,     7, 12, 16, 12,   14, 11, 7, 2,
    // Fras 4: C  G  F  G  (avslut/vandning)
    0, 4, 7, 12,   11, 7, 2, null,  5, 9, 5, 9,      7, 11, 14, null
  ];

  // En basrot per takt (16 takter), en oktav ner. Kvinten laggs till pa halvtakten.
  const CHORD_ROOTS = [
    -12, -17, -15, -19,   // C  G  Am F
    -19, -17, -12, -15,   // F  G  C  Am
    -15, -19, -12, -17,   // Am F  C  G
    -12, -17, -19, -17    // C  G  F  G
  ];

  function playMusicNote(freq, dur, type, vol) {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(g).connect(musicGain);
    osc.start(now);
    osc.stop(now + dur + 0.02);
  }

  function musicTick() {
    if (!audioCtx || !musicGain) return;
    const s = musicStep % MELODY.length;
    const bar = Math.floor(s / 4);
    const beat = s % 4;

    if (MELODY[s] !== null) {
      playMusicNote(semi(MELODY[s]), 0.18, "triangle", 0.5);
    }
    // Bas: rot pa taktslag 0, kvint pa taktslag 2 for studsig kanslo
    if (beat === 0) {
      playMusicNote(semi(CHORD_ROOTS[bar]), 0.42, "sine", 0.9);
    } else if (beat === 2) {
      playMusicNote(semi(CHORD_ROOTS[bar] + 7), 0.3, "sine", 0.7);
    }
    // Latt "hi-hat"-blip pa offbeats for driv
    if (s % 2 === 1) {
      playMusicNote(semi(24 + (s % 3)), 0.04, "square", 0.12);
    }
    musicStep++;
  }

  function startMusic() {
    if (musicStarted) return;
    // Ljud far ALDRIG kunna blockera spelet - svalj alla fel (t.ex. om AudioContext
    // saknas eller blockeras av webblasaren).
    try {
      ensureAudio();
      musicGain = audioCtx.createGain();
      musicGain.gain.value = musicOn ? MUSIC_VOL : 0;
      musicGain.connect(audioCtx.destination);
      musicStarted = true;
      musicTick();
      musicTimer = setInterval(musicTick, STEP_MS);
    } catch (e) {
      musicStarted = true; // forsok inte igen varje bildruta
    }
  }

  function setMusicOn(on) {
    musicOn = on;
    try { localStorage.setItem("hoppspelet_music", on ? "on" : "off"); } catch (e) {}
    if (musicGain) {
      const now = audioCtx.currentTime;
      musicGain.gain.cancelScheduledValues(now);
      musicGain.gain.setTargetAtTime(on ? MUSIC_VOL : 0, now, 0.05);
    }
    const btn = document.getElementById("musicMute");
    if (btn) btn.textContent = on ? "🔊" : "🔇";
  }

  function playJumpSound() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "square";
    // Liten slumpvariation sa hoppet inte later exakt likadant varje gang
    const detune = 0.94 + Math.random() * 0.12;      // ±6 % tonhojd
    const dur = 0.16 + Math.random() * 0.05;
    osc.frequency.setValueAtTime(280 * detune, now);
    osc.frequency.exponentialRampToValueAtTime(620 * detune, now + dur * 0.7);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + dur + 0.02);
  }

  function playDeathSound() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(320, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
    gain.gain.setValueAtTime(0.22, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.45);
  }

  function jump() {
    if (player.onGround) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      playJumpSound();
    }
  }

  function die() {
    if (state === "gameover") return;
    // Kom ihag vilken niva man dog pa sa nasta omgang startar dar (fast med 0 poang).
    // Appliceras forst vid omstart (resetGame) sa gameover-skarmen visar ratt tema.
    pendingLevelOffset = currentThemeIndex();
    state = "gameover";
    best = Math.max(best, getScore());
    try { localStorage.setItem("hoppspelet_best", String(best)); } catch (e) {}
    playDeathSound();
  }

  function playCoinSound() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.setValueAtTime(990, now + 0.07);
    gain.gain.setValueAtTime(0.18, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.18);
  }

  function spawnObstacle() {
    // Slumpa typ: spik (hoppa över), plattform (hoppa upp på) eller takblock (måste gå under)
    const r = Math.random();
    if (r < 0.55) {
      // Faror (spik / kottatande vaxt) har alltid samma storlek
      const w = 34;
      const h = 44;
      obstacles.push({ type: "spike", x: canvas.width + 20, y: GROUND_Y - h, w: w, h: h });
    } else if (r < 0.8) {
      // Plattformar far fortfarande variera (de ar inte faror)
      const w = 90 + Math.random() * 90;
      const platformHeight = 55 + Math.random() * 55;
      const topY = GROUND_Y - platformHeight;
      obstacles.push({ type: "platform", x: canvas.width + 20, y: topY, w: w, h: GROUND_Y - topY });
    } else {
      // Takblock (fara) har alltid samma storlek och hojd over marken
      const w = 100;
      const bottomY = GROUND_Y - PLAYER_SIZE - 38;
      obstacles.push({ type: "ceiling", x: canvas.width + 20, y: 0, w: w, h: bottomY });
    }
  }

  function hasObstacleNear(x1, x2) {
    for (const obs of obstacles) {
      if (obs.x < x2 + 30 && obs.x + obs.w > x1 - 30) return true;
    }
    return false;
  }

  function spawnCoins() {
    const arcCount = 5;
    const spacing = 60;
    const startX = canvas.width + 40;
    const endX = startX + spacing * (arcCount - 1);
    if (hasObstacleNear(startX, endX)) return;

    const baseY = GROUND_Y - PLAYER_SIZE - 20 - Math.random() * 30;
    const arcHeight = 50;
    for (let i = 0; i < arcCount; i++) {
      const x = startX + i * spacing;
      const y = baseY - Math.sin((Math.PI * i) / (arcCount - 1)) * arcHeight;
      coins.push({ x: x, y: y, r: 17, phase: Math.random() * Math.PI * 2, collected: false });
    }
  }

  function handleAction() {
    startMusic(); // startar musiken vid forsta anvandarinteraktion (browsers kraver en gest)
    if (state === "ready") {
      state = "playing";
      resetGame();
    } else if (state === "playing") {
      jump();
    } else if (state === "gameover") {
      state = "playing";
      resetGame();
    }
  }

  Engine.onKeyDown = function (code) {
    if (code === "Space") handleAction();
  };

  canvas.addEventListener("touchstart", function (e) {
    e.preventDefault();
    handleAction();
  }, { passive: false });

  // ---------- Felsökningsknapp (+1000 poäng) ----------
  // mousedown med preventDefault hindrar knapparna fran att ta emot fokus, sa att
  // MELLANSLAG for att hoppa fortsatter fungera som vanligt efter ett klick.
  // Touch hanteras separat och direkt i touchstart eftersom preventDefault dar
  // stoppar webblasaren fran att nagonsin skicka den efterföljande click-handelsen
  // (annars gjorde knapparna ingenting pa iPad).
  function debugGoToTheme(delta) {
    const cur = currentThemeIndex();
    debugThemeOverride = ((cur + delta) % THEMES.length + THEMES.length) % THEMES.length;
  }

  const prevThemeBtn = document.getElementById("debugPrevTheme");
  prevThemeBtn.addEventListener("mousedown", function (e) { e.preventDefault(); });
  prevThemeBtn.addEventListener("touchstart", function (e) {

  prevThemeBtn.addEventListener("click", function () {
    debugGoToTheme(-1);
    prevThemeBtn.blur();
  });

  const nextThemeBtn = document.getElementById("debugNextTheme");
  nextThemeBtn.addEventListener("mousedown", function (e) { e.preventDefault(); });
  nextThemeBtn.addEventListener("touchstart", function (e) {

  nextThemeBtn.addEventListener("click", function () {

  const reloadBtn = document.getElementById("debugReload");
  reloadBtn.addEventListener("mousedown", function (e) { e.preventDefault(); });

  // ---------- Mute-knapp for musiken ----------
  const muteBtn = document.getElementById("musicMute");
  muteBtn.textContent = musicOn ? "🔊" : "🔇";
  function toggleMusic() {
    startMusic();       // sakerstall att musiken ar igang (och ljudet upplast av gesten)
    setMusicOn(!musicOn);
  }
  muteBtn.addEventListener("mousedown", function (e) { e.preventDefault(); });
  muteBtn.addEventListener("touchstart", function (e) {
    e.preventDefault();
    toggleMusic();
  }, { passive: false });
  muteBtn.addEventListener("click", function () {
    toggleMusic();
    muteBtn.blur();
  });

  function update() {
    if (state !== "playing") return;

    // Öka svårighetsgrad sakta med tiden
    speed += 0.0015;
    distance += speed;

    // Gravitation + kollision mot plattformar (kan hoppas upp på, är annars solida)
    const prevBottom = player.y + player.h;
    player.vy += GRAVITY;
    const tentativeY = player.y + player.vy;
    const tentativeBottom = tentativeY + player.h;

    let floor = GROUND_Y;
    let crashed = false;

    for (const obs of obstacles) {
      if (obs.type !== "platform") continue;
      const overlapsX = player.x + player.w > obs.x && player.x < obs.x + obs.w;
      if (!overlapsX) continue;
      if (prevBottom <= obs.y + 1 && tentativeBottom >= obs.y) {
        // Landar ovanpå plattformen
        if (obs.y < floor) floor = obs.y;
      } else if (tentativeBottom > obs.y && player.y < obs.y + obs.h) {
        // Sprang in i plattformens sida/undersida
        crashed = true;
      }
    }

    if (crashed) {
      die();
      return;
    }

    player.y = tentativeY;
    if (player.y + player.h >= floor) {
      player.y = floor - player.h;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.onGround = false;
    }

    // Rotera figuren lite i hoppet för känsla
    if (!player.onGround) {
      player.rotation += 0.12;
    } else {
      player.rotation = 0;
    }

    // Flytta hinder
    for (const obs of obstacles) {
      obs.x -= speed;
    }
    obstacles = obstacles.filter(o => o.x + o.w > -10);

    // Spawna nya hinder
    spawnTimer++;
    if (spawnTimer >= nextSpawnAt) {
      spawnObstacle();
      spawnTimer = 0;
      nextSpawnAt = 55 + Math.random() * 50 - Math.min(speed, 20);
      if (nextSpawnAt < 35) nextSpawnAt = 35;
    }

    // Flytta och samla in mynt (ger extrapoäng, är aldrig farliga)
    for (const c of coins) {
      c.x -= speed;
    }
    for (const c of coins) {
      if (c.collected) continue;
      const dx = (player.x + player.w / 2) - c.x;
      const dy = (player.y + player.h / 2) - c.y;
      if (Math.sqrt(dx * dx + dy * dy) < c.r + player.w * 0.4) {
        c.collected = true;
        coinScore += 10;
        playCoinSound();
        floatingTexts.push({
          x: player.x + player.w / 2,
          y: player.y - 6,
          text: "+10",
          life: 45,
          maxLife: 45
        });
      }
    }
    coins = coins.filter(c => !c.collected && c.x > -30);

    // Poängtext som flyter uppåt vid figuren och tonar bort
    for (const ft of floatingTexts) {
      ft.y -= 1.3;
      ft.x -= speed * 0.3;
      ft.life--;
    }
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);

    coinSpawnTimer++;
    if (coinSpawnTimer >= coinNextSpawnAt) {
      spawnCoins();
      coinSpawnTimer = 0;
      coinNextSpawnAt = 70 + Math.random() * 80;
    }

    // Kollisionskoll mot dödliga hinder (spikar och takblock). Lite marginal för rättvis känsla.
    const margin = 6;
    const playerBox = {
      x: player.x + margin,
      y: player.y + margin,
      w: player.w - margin * 2,
      h: player.h - margin * 2
    };
    for (const obs of obstacles) {
      if (obs.type === "platform") continue;
      if (rectsOverlap(playerBox, obs)) {
        die();
      }
    }
  }

  function drawGround(ctx, theme) {
    // Marken (sten/sand/is beroende på tema)
    ctx.fillStyle = theme.groundColor;
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

    // Textur i marken, rör sig med spelet för känsla av fart
    ctx.fillStyle = theme.crackColor;
    const stripeWidth = 46;
    const offset = Math.floor(distance) % stripeWidth;
    for (let x = -offset; x < canvas.width; x += stripeWidth) {
      ctx.fillRect(x, GROUND_Y + 14, stripeWidth * 0.4, canvas.height - GROUND_Y - 14);
    }

    // Glödande "hazard-remsa" rakt under markytan - rent visuellt, påverkar inte spelet.
    // Lava, bioluminescent rev, gyllene nektar, sprickande is eller alien-energi beroende på tema.
    const hazardH = 12;
    const t = performance.now() / 250;
    const glow = 0.5 + Math.sin(t) * 0.5;
    const grad = ctx.createLinearGradient(0, GROUND_Y - hazardH, 0, GROUND_Y + hazardH);
    grad.addColorStop(0, theme.hazard.top);
    grad.addColorStop(0.4, theme.hazard.mid);
    grad.addColorStop(1, theme.hazard.bottom);
    ctx.save();
    ctx.shadowColor = theme.hazard.glow;
    ctx.shadowBlur = 20 * (0.7 + glow * 0.3);
    ctx.fillStyle = grad;
    ctx.fillRect(0, GROUND_Y - 2, canvas.width, hazardH);
    ctx.restore();

    // Glödande partiklar i remsan
    ctx.fillStyle = theme.hazard.dot;
    const dotSpacing = 90;
    const dOffset = Math.floor(distance * 1.4) % dotSpacing;
    for (let x = -dOffset; x < canvas.width; x += dotSpacing) {
      const bob = Math.sin(t + x) * 2;
      ctx.beginPath();
      ctx.arc(x, GROUND_Y + 2 + bob, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Glödande kristaller inbäddade i berget, för lite färgpop mot stenen
    if (theme.crystalColor) {
      const crystalSpacing = 150;
      const crOffset = Math.floor(distance * 0.7) % crystalSpacing;
      ctx.save();
      ctx.shadowColor = theme.crystalColor;
      ctx.shadowBlur = 10;
      ctx.fillStyle = theme.crystalColor;
      for (let x = -crOffset; x < canvas.width; x += crystalSpacing) {
        const cy = GROUND_Y + 34 + Math.sin(x * 0.04) * 8;
        ctx.beginPath();
        ctx.moveTo(x, cy - 8);
        ctx.lineTo(x + 5, cy);
        ctx.lineTo(x, cy + 8);
        ctx.lineTo(x - 5, cy);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawAmbientParticles(ctx, theme, t) {
    for (const p of ambientParticles) {
      switch (theme.particle) {
        case "bubbles":
          p.y -= p.speed;
          if (p.y < -10) p.y = canvas.height + 10;
          break;
        case "snow":
          p.y += p.speed * 0.6;
          p.x += Math.sin(t + p.phase) * 0.4;
          if (p.y > canvas.height + 10) p.y = -10;
          break;
        case "embers":
          p.y -= p.speed * 0.8;
          p.x += p.drift;
          if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
          break;
        case "fireflies":
          p.x += Math.sin(t * 0.6 + p.phase) * 0.6;
          p.y += Math.cos(t * 0.5 + p.phase) * 0.4;
          break;
        case "stars":
          // Stjärnorna står stilla och blinkar bara
          break;
      }
      if (p.x < -10) p.x = canvas.width + 10;
      if (p.x > canvas.width + 10) p.x = -10;

      const twinkle = theme.particle === "stars" || theme.particle === "fireflies"
        ? 0.4 + 0.6 * (0.5 + Math.sin(t * 2 + p.phase) * 0.5)
        : 1;
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = theme.particleColor;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawJaggedSilhouette(ctx, baseY, peakMin, peakMax, spacing, color, offsetFactor) {
    const offset = (distance * offsetFactor) % spacing;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-spacing * 2, GROUND_Y);
    ctx.lineTo(-spacing * 2, baseY);
    for (let bx = -spacing * 2; bx < canvas.width + spacing * 2; bx += spacing) {
      const x = bx - offset;
      const peak = baseY - (peakMin + Math.abs(Math.sin(bx * 0.013)) * (peakMax - peakMin));
      ctx.lineTo(x + spacing / 2, peak);
      ctx.lineTo(x + spacing, baseY);
    }
    ctx.lineTo(canvas.width + spacing * 2, baseY);
    ctx.lineTo(canvas.width + spacing * 2, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }

  function drawShootingStar(ctx, t, cycle, seedOffset, color, y0, y1) {
    const phase = ((t + seedOffset) % cycle) / cycle;
    if (phase > 0.15) return;
    const p = phase / 0.15;
    const startX = canvas.width * 1.05;
    const endX = -canvas.width * 0.1;
    const x = startX + (endX - startX) * p;
    const y = y0 + (y1 - y0) * p;
    const len = 90;
    ctx.save();
    ctx.globalAlpha = 1 - p;
    const grad = ctx.createLinearGradient(x, y, x + len, y - len * 0.35);
    grad.addColorStop(0, color);
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + len, y - len * 0.35);
    ctx.stroke();
    ctx.restore();
  }

  function drawFish(ctx, x, y, size, color, t, phase) {
    const wob = Math.sin(t * 3 + phase) * 3;
    ctx.save();
    ctx.translate(x, y + wob);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    // Stjart pekar bakat (at hoger) eftersom fisken simmar at vanster, som allt annat i banan
    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(size * 1.7, -size * 0.55);
    ctx.lineTo(size * 1.7, size * 0.55);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawBird(ctx, x, y, size, t, phase, color) {
    const flap = Math.sin(t * 6 + phase) * 0.5;
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = color || "rgba(20,15,5,0.65)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-size, flap * size * 0.7);
    ctx.quadraticCurveTo(0, -size * 0.7, size, flap * size * 0.7);
    ctx.stroke();
    ctx.restore();
  }

  function drawFlutterfly(ctx, x, y, size, t, phase, color) {
    const wingOpen = 0.3 + Math.abs(Math.sin(t * 8 + phase)) * 0.7;
    ctx.save();
    ctx.translate(x, y + Math.sin(t * 2 + phase) * 4);
    ctx.fillStyle = color;
    ctx.save();
    ctx.scale(wingOpen, 1);
    ctx.beginPath();
    ctx.ellipse(-size * 0.6, 0, size * 0.6, size * 0.4, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.scale(wingOpen, 1);
    ctx.beginPath();
    ctx.ellipse(size * 0.6, 0, size * 0.6, size * 0.4, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = "rgba(30,20,10,0.7)";
    ctx.fillRect(-1, -size * 0.35, 2, size * 0.7);
    ctx.restore();
  }

  function drawHangingVine(ctx, x, topY, len, t, phase, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.beginPath();
    for (let i = 0; i <= len; i += 6) {
      const yy = topY + i;
      const xx = x + Math.sin(t * 0.8 + phase + i * 0.05) * 6;
      if (i === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawIceberg(ctx, x, y, w, h, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x - w / 2, y);
    ctx.lineTo(x - w * 0.2, y - h);
    ctx.lineTo(x + w * 0.1, y - h * 0.6);
    ctx.lineTo(x + w / 2, y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawRainbow(ctx, cx, baseY, radius) {
    const colors = ["#ff5a5a", "#ffb84a", "#ffe24a", "#6fce7a", "#5ab4ff", "#a06fff"];
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = 8;
    ctx.lineCap = "round";
    for (let i = 0; i < colors.length; i++) {
      ctx.strokeStyle = colors[i];
      ctx.beginPath();
      ctx.arc(cx, baseY, radius - i * 8, Math.PI, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawFallingStreaks(ctx, t, canvasW, canvasH, count, color, speed, streakLen) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    for (let i = 0; i < count; i++) {
      const seed = i * 137.5;
      const x = (seed * 3.1) % canvasW;
      const y = ((t * speed + seed) * 4) % (canvasH + 40) - 20;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - streakLen * 0.3, y + streakLen);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGroundProp(ctx, x, groundY, type, color) {
    ctx.save();
    ctx.fillStyle = color;
    switch (type) {
      case "mushroom":
        ctx.fillRect(x - 3, groundY - 14, 6, 14);
        ctx.beginPath();
        ctx.ellipse(x, groundY - 16, 12, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case "pumpkin":
        ctx.beginPath();
        ctx.ellipse(x, groundY - 10, 13, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#3a5a20";
        ctx.fillRect(x - 2, groundY - 22, 4, 6);
        break;
      case "tombstone":
        ctx.beginPath();
        ctx.moveTo(x - 10, groundY);
        ctx.lineTo(x - 10, groundY - 20);
        ctx.arc(x, groundY - 20, 10, Math.PI, 0);
        ctx.lineTo(x + 10, groundY);
        ctx.closePath();
        ctx.fill();
        break;
      case "flower":
        ctx.fillRect(x - 1.5, groundY - 14, 3, 14);
        for (let i = 0; i < 5; i++) {
          const a = (Math.PI * 2 * i) / 5;
          ctx.beginPath();
          ctx.arc(x + Math.cos(a) * 6, groundY - 16 + Math.sin(a) * 6, 4, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case "chest":
        ctx.fillRect(x - 14, groundY - 14, 28, 14);
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(x - 14, groundY - 15, 28, 3);
        ctx.fillStyle = "#e8c24a";
        ctx.fillRect(x - 3, groundY - 11, 6, 6);
        break;
      case "gumdrop":
        ctx.beginPath();
        ctx.moveTo(x - 12, groundY);
        ctx.quadraticCurveTo(x - 12, groundY - 20, x, groundY - 20);
        ctx.quadraticCurveTo(x + 12, groundY - 20, x + 12, groundY);
        ctx.closePath();
        ctx.fill();
        break;
    }
    ctx.restore();
  }

  // ---------- Storslagna dekorations-hjalpare ----------
  function drawCloud(ctx, x, y, scale, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x, y, 34 * scale, 16 * scale, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 24 * scale, y - 6 * scale, 22 * scale, 13 * scale, 0, 0, Math.PI * 2);
    ctx.ellipse(x - 24 * scale, y - 4 * scale, 20 * scale, 12 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Parallax-lager av moln som glider forbi langsamt
  function drawDriftingClouds(ctx, t, color, count, yBase, scale, speed) {
    for (let i = 0; i < count; i++) {
      const span = canvas.width + 300;
      const x = ((i * span) / count + t * speed) % span - 150;
      const y = yBase + (i % 2) * 40 * scale;
      drawCloud(ctx, x, y, scale * (0.7 + (i % 3) * 0.2), color);
    }
  }

  function drawPillar(ctx, x, groundY, w, h, color, capColor) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.fillRect(x - w / 2, groundY - h, w, h);
    // rafflor
    ctx.strokeStyle = "rgba(0,0,0,0.15)";
    ctx.lineWidth = 2;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(x - w / 2 + (w / 4) * i, groundY - h);
      ctx.lineTo(x - w / 2 + (w / 4) * i, groundY);
      ctx.stroke();
    }
    ctx.fillStyle = capColor || color;
    ctx.fillRect(x - w / 2 - 5, groundY - h - 8, w + 10, 8);
    ctx.fillRect(x - w / 2 - 5, groundY - 6, w + 10, 6);
    ctx.restore();
  }

  function drawFloatingIsland(ctx, x, y, w, topColor, rockColor, t) {
    const bob = Math.sin(t * 0.6 + x) * 4;
    ctx.save();
    ctx.translate(0, bob);
    ctx.fillStyle = rockColor;
    ctx.beginPath();
    ctx.moveTo(x - w / 2, y);
    ctx.lineTo(x + w / 2, y);
    ctx.lineTo(x + w * 0.15, y + w * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = topColor;
    ctx.beginPath();
    ctx.ellipse(x, y, w / 2, w * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawBalloon(ctx, x, y, r, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y + r * 1.2);
    ctx.lineTo(x, y + r * 1.9);
    ctx.stroke();
    ctx.restore();
  }

  function drawSwayingTree(ctx, x, groundY, trunkH, crownR, trunkColor, crownColor, t, seed) {
    ctx.save();
    ctx.translate(x, groundY);
    ctx.rotate(Math.sin(t * 0.4 + seed) * 0.02);
    ctx.strokeStyle = trunkColor;
    ctx.lineWidth = trunkH * 0.12;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -trunkH);
    ctx.stroke();
    ctx.fillStyle = crownColor;
    ctx.beginPath();
    ctx.arc(0, -trunkH - crownR * 0.4, crownR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawWavingBanner(ctx, x, topY, w, h, color, t, seed) {
    ctx.save();
    ctx.strokeStyle = "rgba(0,0,0,0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, topY);
    ctx.lineTo(x, topY + h + 20);
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, topY);
    for (let i = 0; i <= w; i += 6) {
      ctx.lineTo(x + i, topY + Math.sin(t * 3 + i * 0.2 + seed) * 3);
    }
    for (let i = w; i >= 0; i -= 6) {
      ctx.lineTo(x + i, topY + h + Math.sin(t * 3 + i * 0.2 + seed) * 3);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawFirework(ctx, cx, cy, t, cycle, seed, color) {
    const phase = ((t + seed) % cycle) / cycle;
    if (phase > 0.4) return;
    const p = phase / 0.4;
    ctx.save();
    ctx.globalAlpha = 1 - p;
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2;
    const rays = 12;
    for (let i = 0; i < rays; i++) {
      const a = (Math.PI * 2 * i) / rays;
      const r1 = p * 8;
      const r2 = p * 45;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
      ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawLantern(ctx, x, y, color, t, seed) {
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.3 * (0.5 + Math.sin(t * 2 + seed) * 0.5);
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x, y, 6, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Silhuett av flera byggnader/torn som en stad langt bort
  function drawTowerRow(ctx, baseY, color, offsetFactor, seed) {
    const spacing = 90;
    const offset = (distance * offsetFactor) % spacing;
    ctx.save();
    ctx.fillStyle = color;
    for (let bx = -spacing; bx < canvas.width + spacing; bx += spacing) {
      const x = bx - offset;
      const h = 60 + Math.abs(Math.sin((bx + seed) * 0.03)) * 120;
      const w = spacing * (0.4 + Math.abs(Math.sin((bx + seed) * 0.07)) * 0.25);
      ctx.fillRect(x, baseY - h, w, h);
      // spira ibland
      if (Math.sin((bx + seed) * 0.05) > 0.5) {
        ctx.beginPath();
        ctx.moveTo(x, baseY - h);
        ctx.lineTo(x + w / 2, baseY - h - 20);
        ctx.lineTo(x + w, baseY - h);
        ctx.closePath();
        ctx.fill();
      }
    }
    ctx.restore();
  }

  function drawScenery(ctx, theme, t) {
    switch (theme.key) {
      case "lava": {
        drawJaggedSilhouette(ctx, GROUND_Y - 30, 50, 140, 220, "rgba(20,6,8,0.9)", 0.05);
        const craterX = canvas.width * 0.75;
        const craterY = GROUND_Y - 175;

        // Rök som stiger fran vulkanen
        for (let i = 0; i < 4; i++) {
          const cycle = 10;
          const localT = (t * 0.6 + i * 2.5) % cycle;
          const p = localT / cycle;
          ctx.save();
          ctx.globalAlpha = (1 - p) * 0.3;
          ctx.fillStyle = "rgba(90,80,80,0.8)";
          ctx.beginPath();
          ctx.arc(craterX + Math.sin(i * 2) * 8, craterY - p * 150, 8 + p * 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // Glödande krater, med periodiskt utbrott
        const eruptCycle = 24;
        const eruptPhase = (t % eruptCycle) / eruptCycle;
        const eruptBurst = eruptPhase < 0.08 ? 1 - eruptPhase / 0.08 : 0;
        ctx.save();
        ctx.shadowColor = "rgba(255,140,40,0.9)";
        ctx.shadowBlur = 25 + eruptBurst * 30;
        ctx.fillStyle = "rgba(255,150,60,0.6)";
        ctx.beginPath();
        ctx.arc(craterX, craterY, 9 + eruptBurst * 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Mindre avlagsen vulkan i bakgrunden
        const smallVolcX = canvas.width * 0.4;
        ctx.fillStyle = "rgba(15,5,8,0.7)";
        ctx.beginPath();
        ctx.moveTo(smallVolcX - 35, GROUND_Y - 30);
        ctx.lineTo(smallVolcX, GROUND_Y - 100);
        ctx.lineTo(smallVolcX + 35, GROUND_Y - 30);
        ctx.closePath();
        ctx.fill();

        // Glodande aska/stendebris som driver nedat
        for (let i = 0; i < 5; i++) {
          const cycle = 12;
          const localT = (t * 0.4 + i * 2.2) % cycle;
          const p = localT / cycle;
          const ax = (i * 240 + 60) % canvas.width;
          ctx.save();
          ctx.globalAlpha = (1 - p) * 0.5;
          ctx.fillStyle = "rgba(255,120,50,0.7)";
          ctx.fillRect(ax, canvas.height * 0.1 + p * canvas.height * 0.4, 4, 4);
          ctx.restore();
        }
        break;
      }
      case "ocean": {
        ctx.save();
        ctx.globalAlpha = 0.1;
        ctx.fillStyle = "#bfe9ff";
        for (let i = 0; i < 4; i++) {
          const bx = ((canvas.width / 4) * i + (t * 6)) % (canvas.width + 200) - 100;
          ctx.beginPath();
          ctx.moveTo(bx, 0);
          ctx.lineTo(bx + 60, 0);
          ctx.lineTo(bx - 40, GROUND_Y);
          ctx.lineTo(bx - 100, GROUND_Y);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();

        // Simmande fiskstim i olika djup
        for (let i = 0; i < 4; i++) {
          const spd = 12 + i * 5;
          const x = canvas.width + 80 - ((t * spd + i * 260) % (canvas.width + 300));
          const y = canvas.height * 0.2 + i * 60;
          drawFish(ctx, x, y, 9 + (i % 2) * 3, "rgba(8,25,35,0.5)", t, i * 2);
        }

        drawJaggedSilhouette(ctx, GROUND_Y - 10, 20, 55, 150, "rgba(6,40,45,0.85)", 0.06);

        // Manetflockar som svavar
        for (let i = 0; i < 2; i++) {
          const jx = canvas.width * (0.35 + i * 0.4);
          const jy = canvas.height * 0.3 + Math.sin(t * 0.7 + i) * 30;
          ctx.save();
          ctx.globalAlpha = 0.5;
          ctx.fillStyle = "rgba(220,180,255,0.6)";
          ctx.beginPath();
          ctx.arc(jx, jy, 16, Math.PI, 0);
          ctx.fill();
          ctx.strokeStyle = "rgba(220,180,255,0.5)";
          ctx.lineWidth = 2;
          for (let k = -2; k <= 2; k++) {
            ctx.beginPath();
            ctx.moveTo(jx + k * 6, jy);
            ctx.lineTo(jx + k * 6 + Math.sin(t * 2 + k) * 4, jy + 18);
            ctx.stroke();
          }
          ctx.restore();
        }

        // Sjögräs som vaggar fran havsbotten
        for (let i = 0; i < 4; i++) {
          const gx = 100 + i * ((canvas.width - 200) / 4);
          ctx.save();
          ctx.strokeStyle = "rgba(20,80,60,0.6)";
          ctx.lineWidth = 4;
          ctx.lineCap = "round";
          ctx.beginPath();
          for (let s = 0; s <= 40; s += 8) {
            const yy = GROUND_Y - s;
            const xx = gx + Math.sin(t * 0.9 + i + s * 0.08) * 8;
            if (s === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy);
          }
          ctx.stroke();
          ctx.restore();
        }
        break;
      }
      case "jungle": {
        drawJaggedSilhouette(ctx, GROUND_Y - 20, 60, 170, 240, "rgba(10,30,8,0.85)", 0.045);

        // Flygande faglar
        for (let i = 0; i < 3; i++) {
          const spd = 20 + i * 8;
          const x = (t * spd + i * 300) % (canvas.width + 200) - 100;
          const y = canvas.height * 0.12 + i * 30;
          drawBird(ctx, x, y, 8, t, i * 3);
        }

        // Svajande tempeltrad (placerad langt fran figurens fasta position)
        ctx.save();
        const tx = Math.max(320, canvas.width * 0.3);
        const ty = GROUND_Y - 90;
        ctx.translate(tx, GROUND_Y);
        ctx.rotate(Math.sin(t * 0.4) * 0.02);
        ctx.fillStyle = "rgba(30,25,10,0.7)";
        ctx.beginPath();
        ctx.moveTo(-45, 0);
        ctx.lineTo(-30, ty - GROUND_Y);
        ctx.lineTo(30, ty - GROUND_Y);
        ctx.lineTo(45, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        // Fjarilar
        const butterflyColors = ["rgba(255,140,60,0.8)", "rgba(140,200,255,0.8)", "rgba(255,220,80,0.8)"];
        for (let i = 0; i < 3; i++) {
          const bx2 = (t * (8 + i * 3) + i * 400) % (canvas.width + 100) - 50;
          const by2 = canvas.height * 0.4 + i * 40 + Math.sin(t + i) * 20;
          drawFlutterfly(ctx, bx2, by2, 7, t, i * 4, butterflyColors[i]);
        }

        // Hangande rankor fran overkanten
        for (let i = 0; i < 3; i++) {
          const vx = canvas.width * (0.45 + i * 0.18);
          drawHangingVine(ctx, vx, 0, 70 + i * 20, t, i * 2, "rgba(30,60,15,0.6)");
        }

        // Blommor pa marken
        drawGroundProp(ctx, Math.max(380, canvas.width * 0.5), GROUND_Y, "flower", "rgba(255,120,160,0.7)");
        drawGroundProp(ctx, Math.max(460, canvas.width * 0.58), GROUND_Y, "flower", "rgba(255,220,80,0.7)");
        break;
      }
      case "ice": {
        ctx.save();
        ctx.globalAlpha = 0.25;
        const auroraColors = ["#8affc1", "#8ad9ff", "#c58aff"];
        for (let i = 0; i < 3; i++) {
          ctx.strokeStyle = auroraColors[i];
          ctx.lineWidth = 18;
          ctx.beginPath();
          for (let x = 0; x <= canvas.width; x += 20) {
            const y = 60 + i * 30 + Math.sin(x * 0.01 + t + i) * 25;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
        ctx.restore();
        drawShootingStar(ctx, t, 26, 4, "rgba(255,255,255,0.95)", canvas.height * 0.1, canvas.height * 0.35);
        drawJaggedSilhouette(ctx, GROUND_Y - 10, 70, 190, 210, "rgba(180,220,240,0.5)", 0.05);

        // Isberg som flyter forbi i fjarran
        for (let i = 0; i < 2; i++) {
          const ibx = canvas.width * (0.4 + i * 0.35);
          drawIceberg(ctx, ibx, GROUND_Y - 5, 90 + i * 30, 55 + i * 15, "rgba(210,235,245,0.55)");
        }

        // Pingviner som vaggar pa marken
        for (let i = 0; i < 2; i++) {
          const pgx = Math.max(400, canvas.width * (0.5 + i * 0.1));
          const bob = Math.sin(t * 4 + i) * 2;
          ctx.save();
          ctx.translate(pgx, GROUND_Y + bob);
          ctx.fillStyle = "#1a2a30";
          ctx.beginPath();
          ctx.ellipse(0, -14, 9, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#f2f8fa";
          ctx.beginPath();
          ctx.ellipse(0, -12, 5, 10, 0, 0, Math.PI * 2);
          ctx.fill();
          // Ogon
          ctx.fillStyle = "#0a1418";
          ctx.beginPath();
          ctx.arc(-2.5, -22, 1.2, 0, Math.PI * 2);
          ctx.arc(2.5, -22, 1.2, 0, Math.PI * 2);
          ctx.fill();
          // Orange nabb
          ctx.fillStyle = "#f5a623";
          ctx.beginPath();
          ctx.moveTo(0, -20);
          ctx.lineTo(7, -18);
          ctx.lineTo(0, -16);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
        break;
      }
      case "space": {
        ctx.save();
        const ringAngle = -0.3 + Math.sin(t * 0.08) * 0.12;
        ctx.fillStyle = "#5b3a9e";
        ctx.beginPath();
        ctx.arc(canvas.width * 0.8, canvas.height * 0.22, 34, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(200,180,255,0.6)";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.ellipse(canvas.width * 0.8, canvas.height * 0.22, 52, 14, ringAngle, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "#2e6f9e";
        ctx.beginPath();
        ctx.arc(canvas.width * 0.25, canvas.height * 0.15, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        drawShootingStar(ctx, t, 20, 0, "rgba(220,200,255,0.95)", canvas.height * 0.05, canvas.height * 0.4);

        // Avlagsen rymdstation
        ctx.save();
        const stX = canvas.width * 0.45;
        const stY = canvas.height * 0.12;
        ctx.fillStyle = "rgba(180,190,210,0.6)";
        ctx.fillRect(stX - 16, stY - 6, 32, 12);
        ctx.fillStyle = "rgba(120,180,255,0.5)";
        ctx.fillRect(stX - 30, stY - 3, 12, 6);
        ctx.fillRect(stX + 18, stY - 3, 12, 6);
        ctx.restore();

        // Asteroidbalte som driver forbi
        for (let i = 0; i < 5; i++) {
          const spd = 6 + (i % 3) * 3;
          const ax = canvas.width + 40 - ((t * spd + i * 180) % (canvas.width + 200));
          const ay = canvas.height * (0.15 + (i % 4) * 0.08);
          ctx.save();
          ctx.fillStyle = "rgba(90,80,100,0.6)";
          ctx.beginPath();
          ctx.arc(ax, ay, 4 + (i % 3) * 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        break;
      }
      case "desert": {
        drawJaggedSilhouette(ctx, GROUND_Y - 15, 40, 100, 260, "rgba(150,90,30,0.5)", 0.04);
        ctx.save();
        ctx.shadowColor = "rgba(255,230,150,0.9)";
        ctx.shadowBlur = 30;
        ctx.fillStyle = "rgba(255,240,190,0.9)";
        ctx.beginPath();
        ctx.arc(canvas.width * 0.82, canvas.height * 0.18, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        const px = Math.max(340, canvas.width * 0.65);
        ctx.fillStyle = "rgba(120,70,25,0.7)";
        ctx.beginPath();
        ctx.moveTo(px - 55, GROUND_Y);
        ctx.lineTo(px, GROUND_Y - 95);
        ctx.lineTo(px + 55, GROUND_Y);
        ctx.closePath();
        ctx.fill();

        // Kamelkaravan som vandrar i fjarran
        ctx.save();
        ctx.fillStyle = "rgba(90,55,20,0.6)";
        for (let i = 0; i < 3; i++) {
          const cx2 = canvas.width * 0.42 + i * 30;
          const bob = Math.sin(t * 3 + i) * 2;
          ctx.beginPath();
          ctx.ellipse(cx2, GROUND_Y - 12 + bob, 12, 8, 0, 0, Math.PI * 2);
          ctx.ellipse(cx2 + 8, GROUND_Y - 20 + bob, 6, 7, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        // Rullande ökentumlare
        const tumbleX = (canvas.width - (t * 40) % (canvas.width + 60)) - 30;
        ctx.save();
        ctx.translate(tumbleX, GROUND_Y - 8);
        ctx.rotate(t * 4);
        ctx.strokeStyle = "rgba(100,70,30,0.7)";
        ctx.lineWidth = 2;
        for (let a = 0; a < 6; a++) {
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos((Math.PI / 3) * a) * 8, Math.sin((Math.PI / 3) * a) * 8);
          ctx.stroke();
        }
        ctx.restore();

        // Oas med palmer langt bort
        const oasisX = canvas.width * 0.2;
        ctx.fillStyle = "rgba(80,50,15,0.6)";
        ctx.fillRect(oasisX - 2, GROUND_Y - 45, 4, 45);
        ctx.fillStyle = "rgba(60,110,40,0.6)";
        ctx.beginPath();
        ctx.ellipse(oasisX - 10, GROUND_Y - 48, 12, 6, 0.3, 0, Math.PI * 2);
        ctx.ellipse(oasisX + 10, GROUND_Y - 48, 12, 6, -0.3, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
      case "sky": {
        for (let i = 0; i < 3; i++) {
          const ix = ((canvas.width * 0.4) * i + t * 4) % (canvas.width + 300) - 100;
          const iy = canvas.height * (0.28 + i * 0.12);
          ctx.save();
          ctx.globalAlpha = 0.55;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.ellipse(ix, iy, 55, 18, 0, 0, Math.PI * 2);
          ctx.ellipse(ix + 30, iy - 8, 30, 14, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        drawJaggedSilhouette(ctx, GROUND_Y - 5, 15, 40, 180, "rgba(255,255,255,0.4)", 0.07);

        drawRainbow(ctx, canvas.width * 0.72, canvas.height * 0.55, 90);

        // Avlagset luftskepp
        const airX = canvas.width * 0.3 + Math.sin(t * 0.3) * 20;
        const airY = canvas.height * 0.2;
        ctx.save();
        ctx.fillStyle = "rgba(200,60,60,0.6)";
        ctx.beginPath();
        ctx.ellipse(airX, airY, 30, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(80,60,40,0.6)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(airX - 10, airY + 10);
        ctx.lineTo(airX - 10, airY + 18);
        ctx.moveTo(airX + 10, airY + 10);
        ctx.lineTo(airX + 10, airY + 18);
        ctx.stroke();
        ctx.fillStyle = "rgba(140,90,40,0.6)";
        ctx.fillRect(airX - 12, airY + 18, 24, 6);
        ctx.restore();
        break;
      }
      case "neon": {
        const spacing = 130;
        const offset = (distance * 0.06) % spacing;
        for (let bx = -spacing; bx < canvas.width + spacing; bx += spacing) {
          const x = bx - offset;
          const h = 90 + Math.abs(Math.sin(bx * 0.02)) * 140;
          ctx.fillStyle = "rgba(10,5,20,0.85)";
          ctx.fillRect(x, GROUND_Y - h, spacing * 0.6, h);
          // Vilka fonster som lyser bestams av byggnadens FASTA position (bx) och lokalt
          // rad/kolumn-index - inte skarmpositionen (x) - annars "blinkar" fonstren nar
          // huset glider forbi eftersom bx-offset andras varje bildruta.
          let row = 0;
          for (let wy = GROUND_Y - h + 10; wy < GROUND_Y - 10; wy += 16) {
            let col = 0;
            for (let wx = x + 6; wx < x + spacing * 0.6 - 6; wx += 14) {
              if (Math.sin(bx * 0.7 + row * 2.1 + col * 1.3) > 0.3) {
                ctx.fillStyle = "rgba(0,255,255,0.5)";
              } else {
                ctx.fillStyle = "rgba(255,60,200,0.35)";
              }
              ctx.fillRect(wx, wy, 6, 8);
              col++;
            }
            row++;
          }
        }

        // Flygande bilar
        for (let i = 0; i < 3; i++) {
          const spd2 = 25 + i * 10;
          const cx3 = (t * spd2 + i * 260) % (canvas.width + 100) - 50;
          const cy3 = canvas.height * (0.15 + i * 0.1);
          ctx.save();
          ctx.shadowColor = i % 2 === 0 ? "rgba(0,255,255,0.9)" : "rgba(255,0,200,0.9)";
          ctx.shadowBlur = 8;
          ctx.fillStyle = i % 2 === 0 ? "#0ff0fc" : "#ff2fb0";
          ctx.beginPath();
          ctx.ellipse(cx3, cy3, 14, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        break;
      }
      case "haunted": {
        ctx.save();
        ctx.fillStyle = "rgba(230,230,220,0.5)";
        ctx.beginPath();
        ctx.arc(canvas.width * 0.78, canvas.height * 0.18, 26, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        const cx = Math.max(340, canvas.width * 0.62);
        ctx.fillStyle = "rgba(20,18,25,0.85)";
        ctx.fillRect(cx - 60, GROUND_Y - 110, 120, 110);
        ctx.fillRect(cx - 80, GROUND_Y - 80, 20, 80);
        ctx.fillRect(cx + 60, GROUND_Y - 80, 20, 80);
        ctx.beginPath();
        ctx.moveTo(cx - 80, GROUND_Y - 80);
        ctx.lineTo(cx - 70, GROUND_Y - 105);
        ctx.lineTo(cx - 60, GROUND_Y - 80);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx + 60, GROUND_Y - 80);

        ctx.translate(canvas.width * 0.25, GROUND_Y - 16);

      case "storm": {
        drawJaggedSilhouette(ctx, GROUND_Y - 15, 60, 160, 220, "rgba(10,15,25,0.7)", 0.045);
        // Morka valvande moln
        drawDriftingClouds(ctx, t, "rgba(30,35,50,0.6)", 4, canvas.height * 0.15, 1.3, 8);
        const flashCycle = 5;
        const fp = (t % flashCycle) / flashCycle;
        if (fp < 0.06) {
          ctx.save();
          ctx.globalAlpha = (1 - fp / 0.06) * 0.45;
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.restore();
          // Blixt-zigzag
          ctx.save();
          ctx.strokeStyle = "rgba(255,255,220,0.9)"; ctx.lineWidth = 2;
          const lx = canvas.width * (0.3 + (Math.floor(t / flashCycle) % 3) * 0.2);
          ctx.beginPath();
          ctx.moveTo(lx, canvas.height * 0.15);
          ctx.lineTo(lx - 15, canvas.height * 0.3);
          ctx.lineTo(lx + 8, canvas.height * 0.35);

      case "tornado": {
        // Stor virvlande tromb + kringflygande skrap
        const tx3 = canvas.width * 0.6;

        ctx.moveTo(tx3 - 12, GROUND_Y);
        ctx.quadraticCurveTo(tx3 - 60 + Math.sin(t) * 10, canvas.height * 0.4, tx3 - 70, 0);
        ctx.lineTo(tx3 + 70, 0);
        ctx.quadraticCurveTo(tx3 + 60 + Math.sin(t) * 10, canvas.height * 0.4, tx3 + 12, GROUND_Y);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(120,110,80,0.4)"; ctx.lineWidth = 2;
        for (let i = 0; i < 8; i++) {
          const yy = GROUND_Y - i * (GROUND_Y / 8);
          const w = 12 + (GROUND_Y - yy) * 0.2;
          ctx.beginPath();
          ctx.ellipse(tx3 + Math.sin(t * 3 + i) * 8, yy, w, 6, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
        // Kringflygande skrap
        for (let i = 0; i < 5; i++) {
          const a = t * 3 + i * 1.3;
          const dx = tx3 + Math.cos(a) * (40 + i * 6);
          const dy = canvas.height * 0.4 + Math.sin(a) * 60 - i * 20;

      case "fog": {
        // Flera dimlager + spokiga tradsilhuetter som skymtar
        for (let k = 0; k < 3; k++) {

      case "pizzeria": {

  function drawStarShape(ctx, cx, cy, outerR, innerR) {
    const spikes = 5;
    let rot = -Math.PI / 2;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerR);
    for (let i = 0; i < spikes; i++) {
      let x = cx + Math.cos(rot) * outerR;
      let y = cy + Math.sin(rot) * outerR;
      ctx.lineTo(x, y);
      rot += step;
      x = cx + Math.cos(rot) * innerR;
      y = cy + Math.sin(rot) * innerR;
      ctx.lineTo(x, y);
      rot += step;
    }
    ctx.closePath();
  }

  function drawCoin(ctx, coin, theme, t) {
    const spin = Math.max(0.15, Math.abs(Math.cos(t * 3 + coin.phase)));
    ctx.save();
    ctx.translate(coin.x, coin.y);
    ctx.scale(spin, 1);
    switch (theme.key) {
      case "ocean":
        ctx.save();
        ctx.shadowColor = "rgba(255,255,255,0.7)";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "rgba(150,220,210,0.55)";
        ctx.beginPath();
        ctx.ellipse(0, coin.r * 0.3, coin.r * 1.3, coin.r * 0.6, 0, 0, Math.PI);
        ctx.fill();
        ctx.fillStyle = "#eafdf6";
        ctx.beginPath();
        ctx.arc(0, 0, coin.r * 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      case "jungle": {
        ctx.save();
        ctx.shadowColor = "rgba(255,220,80,0.8)";
        ctx.shadowBlur = 10;
        const r = coin.r;
        const bananaGrad = ctx.createLinearGradient(-r, -r, r, r);
        bananaGrad.addColorStop(0, "#fff2a8");
        bananaGrad.addColorStop(0.5, "#ffd93d");
        bananaGrad.addColorStop(1, "#e2a92b");
        // Banankroppen ritas som ett langt, smalt bojt streck sa den inte blir en rund "boll"
        ctx.strokeStyle = bananaGrad;
        ctx.lineWidth = r * 0.45;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-r * 1.1, r * 0.55);
        ctx.quadraticCurveTo(0, -r * 1.35, r * 1.1, -r * 0.45);
        ctx.stroke();
        // Morkare ridge-linje langs mitten for lite djup
        ctx.strokeStyle = "rgba(150,100,10,0.55)";
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(-r * 0.95, r * 0.4);
        ctx.quadraticCurveTo(0, -r * 1.0, r * 0.95, -r * 0.3);
        ctx.stroke();
        // Bruna tippar i bada andar
        ctx.fillStyle = "#6b4a1f";
        ctx.beginPath();
        ctx.arc(-r * 1.1, r * 0.55, r * 0.16, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(r * 1.1, -r * 0.45, r * 0.16, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      }
      case "ice":
        ctx.save();
        ctx.shadowColor = "rgba(150,220,255,0.9)";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "#cdefff";
        ctx.beginPath();
        ctx.moveTo(0, -coin.r);
        ctx.lineTo(coin.r * 0.7, 0);
        ctx.lineTo(0, coin.r);
        ctx.lineTo(-coin.r * 0.7, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        break;
      case "space":
        ctx.save();
        ctx.shadowColor = "rgba(255,255,200,0.9)";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "#fff6c8";
        drawStarShape(ctx, 0, 0, coin.r, coin.r * 0.45);
        ctx.fill();
        ctx.restore();
        break;
      case "desert":
        ctx.save();
        ctx.shadowColor = "rgba(255,220,120,0.9)";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#e8c26a";
        ctx.beginPath();
        ctx.moveTo(0, -coin.r);
        ctx.lineTo(coin.r * 0.9, coin.r * 0.7);
        ctx.lineTo(-coin.r * 0.9, coin.r * 0.7);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(140,90,20,0.6)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -coin.r);
        ctx.lineTo(0, coin.r * 0.7);
        ctx.stroke();
        ctx.restore();
        break;
      case "sky":
        ctx.save();
        ctx.shadowColor = "rgba(255,255,255,0.9)";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(-coin.r * 0.4, coin.r * 0.15, coin.r * 0.55, 0, Math.PI * 2);
        ctx.arc(coin.r * 0.3, coin.r * 0.1, coin.r * 0.65, 0, Math.PI * 2);
        ctx.arc(0, -coin.r * 0.3, coin.r * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      case "neon":
        ctx.save();
        ctx.shadowColor = "rgba(0,255,255,0.9)";
        ctx.shadowBlur = 14;
        ctx.fillStyle = "#0ff0fc";
        ctx.beginPath();
        ctx.moveTo(0, -coin.r);
        ctx.lineTo(coin.r * 0.75, 0);
        ctx.lineTo(0, coin.r);
        ctx.lineTo(-coin.r * 0.75, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#ff2fb0";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
        break;
      case "haunted":
        ctx.save();
        ctx.shadowColor = "rgba(140,255,170,0.9)";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "rgba(210,255,220,0.85)";
        ctx.beginPath();
        ctx.arc(0, -coin.r * 0.2, coin.r * 0.75, Math.PI, 0, false);
        ctx.lineTo(coin.r * 0.75, coin.r * 0.6);
        ctx.lineTo(coin.r * 0.35, coin.r * 0.3);
        ctx.lineTo(0, coin.r * 0.6);
        ctx.lineTo(-coin.r * 0.35, coin.r * 0.3);
        ctx.lineTo(-coin.r * 0.75, coin.r * 0.6);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#1a1a22";
        ctx.beginPath();
        ctx.arc(-coin.r * 0.25, -coin.r * 0.2, coin.r * 0.12, 0, Math.PI * 2);
        ctx.arc(coin.r * 0.25, -coin.r * 0.2, coin.r * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      case "viking":
        ctx.save();
        ctx.shadowColor = "rgba(200,230,255,0.8)";
        ctx.shadowBlur = 8;
        ctx.fillStyle = "#8a95a0";
        ctx.beginPath();
        ctx.ellipse(0, 0, coin.r * 0.85, coin.r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#e8eef2";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -coin.r * 0.6);
        ctx.lineTo(0, coin.r * 0.6);
        ctx.moveTo(-coin.r * 0.4, -coin.r * 0.3);
        ctx.lineTo(coin.r * 0.4, coin.r * 0.3);
        ctx.stroke();
        ctx.restore();
        break;
      case "dino":
        ctx.save();
        ctx.shadowColor = "rgba(200,255,140,0.8)";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#e9dfae";
        ctx.beginPath();
        ctx.ellipse(0, 0, coin.r * 0.75, coin.r, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(120,150,60,0.6)";
        ctx.beginPath();
        ctx.ellipse(-coin.r * 0.2, -coin.r * 0.3, coin.r * 0.12, coin.r * 0.18, 0.3, 0, Math.PI * 2);
        ctx.ellipse(coin.r * 0.25, coin.r * 0.1, coin.r * 0.1, coin.r * 0.15, -0.2, 0, Math.PI * 2);
        ctx.ellipse(-coin.r * 0.1, coin.r * 0.4, coin.r * 0.1, coin.r * 0.14, 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      case "candy":
        ctx.save();
        ctx.shadowColor = "rgba(255,150,200,0.9)";
        ctx.shadowBlur = 10;
        for (let i = 0; i < 3; i++) {
          ctx.strokeStyle = i % 2 === 0 ? "#e0325c" : "#ffffff";
          ctx.lineWidth = coin.r * 0.4;
          ctx.beginPath();
          ctx.arc(0, 0, coin.r * (1 - i * 0.32), 0, Math.PI * 1.5);
          ctx.stroke();
        }
        ctx.restore();
        break;
      case "robot":
        ctx.save();
        ctx.shadowColor = "rgba(255,190,60,0.9)";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#e8b840";
        drawGearSpike(ctx, { x: -coin.r, y: -coin.r, w: coin.r * 2, h: coin.r * 2 });
        ctx.restore();
        break;
      case "autumn":
        ctx.save();
        ctx.shadowColor = "rgba(230,150,60,0.8)";
        ctx.shadowBlur = 8;
        ctx.fillStyle = "#8a5a2a";
        ctx.beginPath();
        ctx.ellipse(0, -coin.r * 0.55, coin.r * 0.6, coin.r * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#c98a4a";
        ctx.beginPath();
        ctx.ellipse(0, coin.r * 0.15, coin.r * 0.6, coin.r * 0.75, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      default: {
        ctx.save();
        ctx.shadowColor = "rgba(255,210,80,0.9)";
        ctx.shadowBlur = 12;
        const g = ctx.createRadialGradient(0, 0, 1, 0, 0, coin.r);
        g.addColorStop(0, "#fff6c8");
        g.addColorStop(0.5, "#ffd54a");
        g.addColorStop(1, "#c98b1f");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(0, 0, coin.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      }
    }
    ctx.restore();
  }

  function drawPlayer(ctx) {
    ctx.save();
    ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
    ctx.rotate(player.rotation);
    ctx.fillStyle = "#2563eb";
    ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);

    // ögon
    ctx.fillStyle = "#1b1f2a";
    ctx.fillRect(4, -8, 5, 5);
    ctx.fillRect(-player.w / 2 + 6, -8, 5, 5);

    // arga ögonbryn (vinklade linjer ovanför ögonen)
    ctx.strokeStyle = "#1b1f2a";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(2, -13);
    ctx.lineTo(11, -16);
    ctx.moveTo(-2, -13);
    ctx.lineTo(-11, -16);
    ctx.stroke();

    ctx.restore();
  }

  function drawFloatingTexts(ctx) {
    for (const ft of floatingTexts) {
      const alpha = Math.max(0, ft.life / ft.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = "center";
      ctx.font = "bold 20px 'Segoe UI', Arial, sans-serif";
      ctx.strokeStyle = "rgba(0,0,0,0.7)";
      ctx.lineWidth = 3;
      ctx.strokeText(ft.text, ft.x, ft.y);
      ctx.fillStyle = "#ffe066";
      ctx.fillText(ft.text, ft.x, ft.y);
      ctx.restore();
    }
  }

  function drawSeaUrchin(ctx, obs) {
    const cx = obs.x + obs.w / 2, cy = obs.y + obs.h / 2, r = Math.min(obs.w, obs.h) / 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = ctx.fillStyle;
    ctx.lineWidth = 2;
    const spikes = 10;
    for (let i = 0; i < spikes; i++) {
      const a = (Math.PI * 2 / spikes) * i;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * r * 0.5, cy + Math.sin(a) * r * 0.5);
      ctx.lineTo(cx + Math.cos(a) * r * 1.2, cy + Math.sin(a) * r * 1.2);
      ctx.stroke();
    }
  }

  function drawVenusTrap(ctx, obs) {
    const cx = obs.x + obs.w / 2;
    const groundY = obs.y + obs.h;
    const headY = obs.y + obs.h * 0.42;   // dar de gapande kaftarna sitter
    const lobeR = obs.w * 0.52;
    const gape = 0.42;                      // hur mycket munnen gapar (radianer fran mittlinjen)
    // Latt "andning"/tuggning sa vaxten kanns levande
    const chew = Math.sin(performance.now() / 220 + obs.x * 0.05) * 0.12;
    const openAngle = gape + Math.max(0, chew);

    // ---- Stjalk med ett par blad ----
    ctx.save();
    ctx.strokeStyle = "#2f6b22";
    ctx.lineWidth = obs.w * 0.16;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(cx, groundY);
    ctx.quadraticCurveTo(cx + Math.sin(chew) * 6, (groundY + headY) / 2, cx, headY + lobeR * 0.4);
    ctx.stroke();
    // Blad
    ctx.fillStyle = "#3a7d26";
    for (const dir of [-1, 1]) {
      ctx.beginPath();
      ctx.ellipse(cx + dir * obs.w * 0.28, groundY - obs.h * 0.18, obs.w * 0.22, obs.h * 0.08, dir * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // ---- Tva gapande kaftlober ----
    // Varje lob ar en halvellips som roterats ut fran mittlinjen (uppat).
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(cx, headY);
      ctx.rotate(side * openAngle);
      // Yttre lob (gron gradient)
      const g = ctx.createLinearGradient(0, -lobeR, 0, 0);
      g.addColorStop(0, "#7ab83a");
      g.addColorStop(1, "#356b1e");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, -lobeR * 0.5, lobeR * 0.62, lobeR, 0, 0, Math.PI * 2);
      ctx.fill();
      // Rod insida
      ctx.fillStyle = "#c0324f";
      ctx.beginPath();
      ctx.ellipse(0, -lobeR * 0.5, lobeR * 0.4, lobeR * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Sma trigger-har pa insidan
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.lineWidth = 1;
      for (let h = 0; h < 3; h++) {
        ctx.beginPath();
        ctx.moveTo(0, -lobeR * (0.35 + h * 0.2));
        ctx.lineTo(side * 3, -lobeR * (0.35 + h * 0.2) - 5);
        ctx.stroke();
      }
      // Sammanflatande tander langs innerkanten (den rundade toppen)
      ctx.fillStyle = "#eae4cf";
      const teeth = 7;
      for (let i = 0; i <= teeth; i++) {
        const a = Math.PI + (Math.PI * i) / teeth; // over ytterkanten
        const ex = Math.cos(a) * lobeR * 0.62;
        const ey = -lobeR * 0.5 + Math.sin(a) * lobeR;
        // rikta tanden inat mot mittlinjen (side * -1)
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(ex - side * 7, ey - 3);
        ctx.lineTo(ex - side * 2, ey + 6);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    // Liten glodande "lockbete"-droppe i mitten av munnen
    ctx.fillStyle = "rgba(255,240,150,0.8)";
    ctx.beginPath();
    ctx.arc(cx, headY - lobeR * 0.35, obs.w * 0.06, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawIcicleCluster(ctx, obs) {
    const n = 3;
    for (let i = 0; i < n; i++) {
      const bx = obs.x + (obs.w / n) * i;
      const bw = obs.w / n;
      const h = obs.h * (i === 1 ? 1 : 0.65);
      ctx.beginPath();
      ctx.moveTo(bx, obs.y + obs.h);
      ctx.lineTo(bx + bw / 2, obs.y + (obs.h - h));
      ctx.lineTo(bx + bw, obs.y + obs.h);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawAsteroidChunk(ctx, obs) {
    ctx.beginPath();
    ctx.moveTo(obs.x, obs.y + obs.h * 0.6);
    ctx.lineTo(obs.x + obs.w * 0.25, obs.y + obs.h * 0.1);
    ctx.lineTo(obs.x + obs.w * 0.6, obs.y);
    ctx.lineTo(obs.x + obs.w, obs.y + obs.h * 0.35);
    ctx.lineTo(obs.x + obs.w * 0.85, obs.y + obs.h);
    ctx.lineTo(obs.x + obs.w * 0.2, obs.y + obs.h);
    ctx.closePath();
    ctx.fill();
  }

  function drawCactus(ctx, obs) {
    const cx = obs.x + obs.w / 2;
    const stemW = obs.w * 0.4;
    ctx.fillRect(cx - stemW / 2, obs.y, stemW, obs.h);
    const armW = obs.w * 0.28;
    ctx.fillRect(obs.x, obs.y + obs.h * 0.35, armW, obs.h * 0.45);
    ctx.fillRect(obs.x + obs.w - armW, obs.y + obs.h * 0.2, armW, obs.h * 0.45);
  }

  function drawCandyCane(ctx, obs) {
    const cx = obs.x + obs.w / 2;
    const w = obs.w * 0.5;
    const hookY = obs.y + obs.h * 0.35;

    // Vit stav med bojd hake upptill
    ctx.save();
    ctx.lineWidth = w;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(cx, obs.y + obs.h);
    ctx.lineTo(cx, hookY);
    ctx.arc(cx - w * 0.5, hookY, w * 0.5, 0, -Math.PI, true);
    ctx.stroke();
    ctx.restore();

    // Roda diagonala ranSder ovanpa staven
    ctx.save();
    ctx.strokeStyle = "#e0325c";
    ctx.lineWidth = w * 0.28;
    ctx.lineCap = "round";
    for (let i = 0; i < 4; i++) {
      const yy = obs.y + obs.h * 0.42 + i * ((obs.h * 0.58) / 4);
      ctx.beginPath();
      ctx.moveTo(cx - w * 0.42, yy + w * 0.3);
      ctx.lineTo(cx + w * 0.42, yy - w * 0.3);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawGearSpike(ctx, obs) {
    const cx = obs.x + obs.w / 2, cy = obs.y + obs.h / 2, r = Math.min(obs.w, obs.h) / 2;
    const teeth = 8;
    ctx.beginPath();
    for (let i = 0; i < teeth; i++) {
      const a1 = (Math.PI * 2 / teeth) * i;
      const a2 = a1 + (Math.PI * 2 / teeth) * 0.5;
      const x1 = cx + Math.cos(a1) * r, y1 = cy + Math.sin(a1) * r;
      const x2 = cx + Math.cos(a2) * r * 0.65, y2 = cy + Math.sin(a2) * r * 0.65;
      if (i === 0) ctx.moveTo(x1, y1); else ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawObstacle(ctx, obs, theme) {
    if (obs.type === "platform") {
      ctx.fillStyle = theme.platform;
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = theme.platformTop;
      ctx.fillRect(obs.x, obs.y, obs.w, 8);
      // lite kant-textur
      ctx.fillStyle = "rgba(0,0,0,0.2)";
      for (let x = obs.x + 10; x < obs.x + obs.w - 5; x += 22) {
        ctx.fillRect(x, obs.y + 10, 10, obs.h - 16);
      }
    } else if (obs.type === "ceiling") {
      ctx.fillStyle = theme.ceiling;
      ctx.fillRect(obs.x, 0, obs.w, obs.h);
      // hängande formationer längs underkanten (stalaktiter/istappar/vinrankor/klippor)
      ctx.fillStyle = theme.ceiling;
      const spikeCount = Math.max(2, Math.floor(obs.w / 20));
      const spikeW = obs.w / spikeCount;
      for (let i = 0; i < spikeCount; i++) {
        const sx = obs.x + i * spikeW;
        ctx.beginPath();
        ctx.moveTo(sx, obs.h);
        ctx.lineTo(sx + spikeW / 2, obs.h + 14);
        ctx.lineTo(sx + spikeW, obs.h);
        ctx.closePath();
        ctx.fill();
        if (theme.ceilingAccent) {
          ctx.save();
          ctx.shadowColor = theme.ceilingAccent;
          ctx.shadowBlur = 8;
          ctx.fillStyle = theme.ceilingAccent;
          ctx.beginPath();
          ctx.arc(sx + spikeW / 2, obs.h + 12, 2.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          ctx.fillStyle = theme.ceiling;
        }
      }
    } else {
      ctx.fillStyle = theme.spike;
      switch (theme.key) {
        case "ocean":
          drawSeaUrchin(ctx, obs);
          break;
        case "jungle":
          drawVenusTrap(ctx, obs);
          break;
        case "ice":
          drawIcicleCluster(ctx, obs);
          break;
        case "space":
          drawAsteroidChunk(ctx, obs);
          break;
        case "desert":
          drawCactus(ctx, obs);
          break;
        case "candy":
          drawCandyCane(ctx, obs);
          break;
        case "robot":
          drawGearSpike(ctx, obs);
          break;
        default:
          ctx.beginPath();
          ctx.moveTo(obs.x, obs.y + obs.h);
          ctx.lineTo(obs.x + obs.w / 2, obs.y);
          ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
          ctx.closePath();
          ctx.fill();
          if (theme.spikeStroke) {
            ctx.strokeStyle = theme.spikeStroke;
            ctx.lineWidth = 2;
            ctx.stroke();
          }
      }
    }
  }

  function drawUI(ctx, theme) {
    ctx.save();
    ctx.fillStyle = "#f5f0e6";
    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 4;
    ctx.font = "bold 20px 'Segoe UI', Arial, sans-serif";
    ctx.fillText("Poäng: " + getScore(), 16, 30);
    ctx.font = "14px 'Segoe UI', Arial, sans-serif";
    ctx.fillText("Bästa: " + best, 16, 50);
    ctx.font = "13px 'Segoe UI', Arial, sans-serif";
    ctx.fillText(theme.name, 16, 70);
    ctx.restore();

    if (state === "ready") {
      overlayText(ctx, "Tryck MELLANSLAG eller skärmen för att starta");
    } else if (state === "gameover") {
      overlayText(ctx, "Du dog! Poäng: " + getScore() + " — Mellanslag/skärm för att starta om");
    }

    if (themeAnnounce > 0) {
      const alpha = Math.min(1, themeAnnounce / 30);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(0, canvas.height / 2 - 60, canvas.width, 90);
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 34px 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(theme.name + "!", canvas.width / 2, canvas.height / 2);
      ctx.restore();
      themeAnnounce--;
    }
  }

  function overlayText(ctx, text) {
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 24px 'Segoe UI', Arial, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    ctx.restore();
  }

  function draw() {
    const ctx = Engine.ctx;
    const theme = THEMES[currentThemeIndex()];

    if (appliedThemeIndex !== currentThemeIndex()) {
      appliedThemeIndex = currentThemeIndex();
      canvas.style.background = theme.bg;
      if (state === "playing") {
        themeAnnounce = 150;
      }
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = performance.now() / 250;
    drawAmbientParticles(ctx, theme, t);
    drawScenery(ctx, theme, t);
    drawGround(ctx, theme);
    for (const obs of obstacles) drawObstacle(ctx, obs, theme);
    for (const c of coins) drawCoin(ctx, c, theme, t);
    drawPlayer(ctx);
    drawFloatingTexts(ctx);
    drawUI(ctx, theme);

    // Loggan visas bara pa startskarmen
    const showLogo = state === "ready";
    if (showLogo !== logoVisible) {
      logoVisible = showLogo;
      logoEl.classList.toggle("hidden", !showLogo);
    }
  }

  const logoEl = document.getElementById("logo");
  let logoVisible = true;

  resetGame();
  Engine.start(update, draw);
})();
</script>
